<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="credit">Code by Parth</div>

    <div class="card-wrap">
        <div class="main">
            <input type="number" class="exit_hours" placeholder="hours of exit">
            <input type="number" class="exit_minutes" placeholder="minutes of exit">
            <input type="number" class="enter_hours" placeholder="hours of entering">
            <input type="number" class="enter_minutes" placeholder="minutes of entering">
            <input type="submit" class="sumbit" value="Submit">
            <button type="reset" class="reset">reset</button>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
